<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выход</title>
    <!-- Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1a2b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse at 20% 50%, #143456 0%, #0a1522 100%);
        }

        .logout-card {
            max-width: 480px;
            width: 100%;
            background: rgba(18, 40, 68, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 3rem 2.5rem 2.8rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(74, 144, 226, 0.08);
            border: 1px solid rgba(100, 180, 255, 0.08);
            text-align: center;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
        }

        .logout-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(74, 144, 226, 0.15);
        }

        /* Иконка */
        .icon-wrapper {
            width: 96px;
            height: 96px;
            background: rgba(30, 80, 140, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3rem;
            color: #7bb3e6;
            box-shadow: 0 8px 32px rgba(30, 120, 220, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: 0.3s ease;
            border: 1px solid rgba(100, 180, 255, 0.10);
        }

        .logout-card:hover .icon-wrapper {
            background: rgba(40, 100, 180, 0.30);
            box-shadow: 0 8px 40px rgba(30, 120, 220, 0.20);
            border-color: rgba(100, 180, 255, 0.20);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #e8f0f8;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .sub-message {
            font-size: 1rem;
            color: #8fb0d0;
            margin-bottom: 2rem;
            line-height: 1.5;
            padding: 0 0.5rem;
        }

        .sub-message i {
            color: #6daddb;
            margin-right: 6px;
        }

        /* Кнопка входа */
        .btn-login {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #1d4f7a, #0f3150);
            color: #e8f0f8;
            padding: 0.8rem 2.4rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(0, 30, 70, 0.4);
            transition: all 0.25s ease;
            border: 1px solid rgba(100, 180, 255, 0.12);
            cursor: pointer;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #236bb0, #134572);
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0, 50, 120, 0.5);
            border-color: rgba(100, 180, 255, 0.25);
        }

        .btn-login i {
            color: #8ac0f0;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-login:hover i {
            color: #b0d8ff;
        }

        /* Дополнительная информация */
        .footer-info {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(100, 180, 255, 0.06);
            display: flex;
            justify-content: center;
            gap: 1.8rem;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #6e91b5;
        }

        .footer-info span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .footer-info i {
            color: #4a7ba5;
            font-size: 0.85rem;
        }

        .footer-info a {
            color: #7bb3e6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-info a:hover {
            color: #b0d8ff;
            text-decoration: underline;
        }

        /* Адаптив */
        @media (max-width: 500px) {
            .logout-card {
                padding: 2rem 1.5rem;
                border-radius: 32px;
            }
            .icon-wrapper {
                width: 72px;
                height: 72px;
                font-size: 2.2rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .btn-login {
                padding: 0.7rem 1.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="logout-card">
    <!-- Иконка выхода -->
    <div class="icon-wrapper">
        <i class="fas fa-sign-out-alt"></i>
    </div>

    <h1>Вы вышли</h1>
    <p class="sub-message">
        <i class="fas fa-check-circle"></i>
        Сеанс завершён. До новых встреч!
    </p>

    <!-- Кнопка "Войти снова" -->
    <a href="{% url 'login' %}" class="btn-login">
        <i class="fas fa-arrow-right"></i> Войти снова
    </a>

    <!-- Нижняя информация -->
    <div class="footer-info">
        <span><i class="far fa-clock"></i> Безопасный выход</span>
        <span><i class="fas fa-lock"></i> Сеанс закрыт</span>
        <span>
            <i class="fas fa-home"></i>
            <a href="{% url 'user_index' %}">На главную</a>
        </span>
    </div>
</div>

</body>
</html>
