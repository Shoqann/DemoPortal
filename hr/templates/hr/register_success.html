<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сотрудник зарегистрирован · HR-система</title>
    <!-- Google Font & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b1a2b;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            background-image: radial-gradient(ellipse at 20% 50%, #143456 0%, #0a1522 100%);
        }

        .success-card {
            max-width: 500px;
            width: 100%;
            background: rgba(18, 40, 68, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 3rem 2.8rem 2.8rem;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(74, 144, 226, 0.08);
            border: 1px solid rgba(100, 180, 255, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .success-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(74, 144, 226, 0.15);
        }

        /* Иконка успеха */
        .icon-wrapper {
            width: 96px;
            height: 96px;
            background: rgba(60, 180, 100, 0.20);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 3.2rem;
            color: #80d8a0;
            box-shadow: 0 8px 32px rgba(60, 180, 100, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            transition: 0.3s ease;
            border: 1px solid rgba(60, 180, 100, 0.15);
        }

        .success-card:hover .icon-wrapper {
            background: rgba(60, 180, 100, 0.30);
            box-shadow: 0 8px 40px rgba(60, 180, 100, 0.20);
            border-color: rgba(60, 180, 100, 0.25);
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #e8f0f8;
            letter-spacing: -0.02em;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        .sub-message {
            font-size: 0.95rem;
            color: #8fb0d0;
            text-align: center;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .sub-message i {
            color: #6daddb;
            margin-right: 6px;
        }

        /* Информация о сотруднике */
        .employee-info {
            background: rgba(10, 25, 45, 0.60);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(100, 180, 255, 0.06);
            text-align: left;
        }

        .employee-info .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(100, 180, 255, 0.04);
            color: #c8dce8;
            font-size: 0.95rem;
        }

        .employee-info .info-row:last-child {
            border-bottom: none;
        }

        .employee-info .info-row .label {
            color: #8fb0d0;
            font-weight: 500;
        }

        .employee-info .info-row .value {
            color: #e8f0f8;
            font-weight: 600;
            word-break: break-all;
            text-align: right;
            max-width: 60%;
        }

        .employee-info .info-row .value strong {
            color: #7bb3e6;
        }

        /* Пароль с кнопкой копирования */
        .password-wrapper {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 25, 45, 0.80);
            padding: 0.3rem 0.8rem 0.3rem 1rem;
            border-radius: 40px;
            border: 1px solid rgba(100, 180, 255, 0.10);
        }

        .password-wrapper .password-text {
            font-weight: 700;
            color: #b0d8ff;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.5px;
            font-size: 1rem;
        }

        .password-wrapper .copy-btn {
            background: rgba(100, 180, 255, 0.10);
            border: none;
            color: #8fb0d0;
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .password-wrapper .copy-btn:hover {
            background: rgba(100, 180, 255, 0.20);
            color: #b0d8ff;
        }

        .password-wrapper .copy-btn i {
            font-size: 0.75rem;
        }

        /* Предупреждение */
        .warning-note {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(200, 160, 50, 0.12);
            border-left: 3px solid #d4b85a;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            margin-bottom: 2rem;
            color: #d4c88a;
            font-size: 0.9rem;
        }

        .warning-note i {
            color: #d4b85a;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        /* Кнопка входа */
        .btn-login {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(135deg, #1d4f7a, #0f3150);
            color: #e8f0f8;
            padding: 0.85rem 2.4rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            text-decoration: none;
            border: 1px solid rgba(100, 180, 255, 0.12);
            box-shadow: 0 8px 24px rgba(0, 30, 70, 0.4);
            transition: all 0.25s ease;
            width: 100%;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #236bb0, #134572);
            transform: translateY(-3px);
            box-shadow: 0 14px 36px rgba(0, 50, 120, 0.5);
            border-color: rgba(100, 180, 255, 0.25);
        }

        .btn-login i {
            color: #8ac0f0;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-login:hover i {
            color: #b0d8ff;
        }

        /* Адаптив */
        @media (max-width: 550px) {
            .success-card {
                padding: 2rem 1.5rem;
                border-radius: 32px;
            }
            .icon-wrapper {
                width: 72px;
                height: 72px;
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .employee-info .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
            }
            .employee-info .info-row .value {
                max-width: 100%;
                text-align: left;
            }
            .btn-login {
                padding: 0.7rem 1.8rem;
                font-size: 0.9rem;
            }
            .password-wrapper {
                flex-wrap: wrap;
                padding: 0.3rem 0.6rem;
            }
        }
    </style>
</head>
<body>

<div class="success-card">
    <!-- Иконка успеха -->
    <div class="icon-wrapper">
        <i class="fas fa-check-circle"></i>
    </div>

    <h1>Сотрудник зарегистрирован</h1>
    <p class="sub-message">
        <i class="fas fa-user-check"></i>
        Учётная запись успешно создана
    </p>

    <!-- Информация о сотруднике -->
    <div class="employee-info">
        <div class="info-row">
            <span class="label"><i class="fas fa-user"></i> Сотрудник</span>
            <span class="value">{{ employee.first_name }} {{ employee.last_name }}</span>
        </div>
        <div class="info-row">
            <span class="label"><i class="fas fa-user-circle"></i> Логин</span>
            <span class="value"><strong>{{ username }}</strong></span>
        </div>
        <div class="info-row">
            <span class="label"><i class="fas fa-lock"></i> Пароль</span>
            <span class="value">
                <span class="password-wrapper">
                    <span class="password-text">{{ password }}</span>
                    <button class="copy-btn" onclick="copyPassword()" title="Скопировать пароль">
                        <i class="fas fa-copy"></i>
                    </button>
                </span>
            </span>
        </div>
    </div>

    <!-- Предупреждение о смене пароля -->
    <div class="warning-note">
        <i class="fas fa-shield-alt"></i>
        <span>Попросите сотрудника сменить пароль после первого входа.</span>
    </div>

    <!-- Кнопка входа -->
    <a href="{% url 'login' %}" class="btn-login">
        <i class="fas fa-arrow-right"></i> Войти в систему
    </a>
</div>

<script>
    function copyPassword() {
        const passwordText = document.querySelector('.password-text');
        const password = passwordText.textContent.trim();

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(password).then(() => {
                const btn = document.querySelector('.copy-btn');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                }, 2000);
            }).catch(() => {
                fallbackCopy(password);
            });
        } else {
            fallbackCopy(password);
        }
    }

    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        textarea.style.opacity = '0';
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand('copy');
            const btn = document.querySelector('.copy-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => {
                btn.innerHTML = originalHtml;
            }, 2000);
        } catch (err) {
            console.error('Не удалось скопировать пароль', err);
        }
        document.body.removeChild(textarea);
    }
</script>

</body>
</html>
